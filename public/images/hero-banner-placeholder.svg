    <circle cx="1180" cy="190" r="90" />
  </g>
  <g fill="none" stroke="#cfa72f" stroke-opacity="0.5" stroke-width="3">
    <rect x="120" y="120" width="1360" height="620" rx="24" />
    <rect x="145" y="145" width="1310" height="570" rx="20" stroke-dasharray="10 10" />
  </g>
  <text x="800" y="365" text-anchor="middle" fill="#f7f7f7" font-family="Montserrat, Arial, sans-serif" font-size="52" font-weight="700">HERO BANNER PLACEHOLDER</text>
  <text x="800" y="430" text-anchor="middle" fill="#d8d9dc" font-family="Montserrat, Arial, sans-serif" font-size="28">Replace /public/images/hero-banner-placeholder.svg</text>
  <text x="800" y="470" text-anchor="middle" fill="#d8d9dc" font-family="Montserrat, Arial, sans-serif" font-size="28">or update the hero image path in src/content/site.json</text>
