<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">SL Colonies Hero Placeholder</title>
  <desc id="desc">Replace with your final hero banner artwork</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2228" />
      <stop offset="60%" stop-color="#282d34" />
      <stop offset="100%" stop-color="#1a1d23" />
    </linearGradient>
  </defs>
  <rect width="1600" height="860" fill="url(#bg)" />
  <g opacity="0.2" fill="#cfa72f">
    <circle cx="190" cy="210" r="130" />
